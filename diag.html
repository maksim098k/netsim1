<!DOCTYPE html>
<html lang="ru">
<head>

<title>IDEF0 — NetSim</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#fff; font-family:Arial,sans-serif; display:flex; justify-content:center; padding:20px; }
.page { width:1100px; border:2px solid #000; background:#fff; }

.header { display:grid; grid-template-columns:1fr 200px 140px 90px 110px; border-bottom:1px solid #000; font-size:11px; }
.hc { padding:5px 8px; border-right:1px solid #000; }
.hc:last-child { border-right:none; }
.hc .lbl { color:#666; font-size:9px; text-transform:uppercase; }
.hc .val { font-weight:bold; font-size:11px; margin-top:1px; }
.hc .meta span { display:block; font-size:10px; }
.status-rows { display:flex; flex-direction:column; }
.sr { display:flex; align-items:center; gap:5px; padding:2px 4px; font-size:10px; border-bottom:1px solid #ddd; }
.sr:last-child { border-bottom:none; }
.sb { width:13px; height:13px; border:1px solid #000; flex-shrink:0; }
.sb.on { background:#000; }
.ctx { display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ctx .top { font-size:9px; color:#666; }
.ctx .big { font-size:18px; font-weight:bold; }

.footer { display:grid; grid-template-columns:90px 1fr 130px; border-top:1px solid #000; }
.fc { padding:6px 10px; border-right:1px solid #000; font-size:11px; }
.fc:last-child { border-right:none; }
.fc .lbl { color:#666; font-size:9px; text-transform:uppercase; }
.fc .val { font-weight:bold; font-size:12px; margin-top:2px; }
.node { display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:bold; }
</style>
</head>
