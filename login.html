<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetSim — Вход / Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="db.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            background: #ffffff;
            border-radius: 20px;
            width: 440px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(30px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .login-header {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            padding: 36px 40px 28px;
            text-align: center;
        }

        .login-header .logo { font-size: 42px; margin-bottom: 10px; }
        .login-header h1 { font-size: 22px; font-weight: 700; color: #fff; margin: 0; }
        .login-header p  { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 6px; }

        .login-tabs {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #4361ee;
            border-bottom-color: #4361ee;
            background: rgba(67,97,238,0.05);
        }

        .tab-btn:hover:not(.active) { color: #1e293b; }

        .login-form { padding: 30px 40px 36px; display: none; }
        .login-form.active { display: block; }

        .field-group { margin-bottom: 18px; }
        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 8px;
        }
        .field-group input {
            width: 100%;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            color: #1e293b;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-group input:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
        }
        .field-group input.error-input { border-color: #dc2626; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
            box-shadow: 0 4px 14px rgba(67,97,238,0.25);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67,97,238,0.35);
        }

        .btn-login:active { transform: translateY(0); }

        .error-msg {
            background: rgba(220,38,38,0.08);
            border: 1px solid rgba(220,38,38,0.2);
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .success-msg {
            background: rgba(5,150,105,0.08);
            border: 1px solid rgba(5,150,105,0.2);
            color: #047857;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .back-to-index {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
            font-weight: 500;
        }

        .back-to-index:hover { color: #4361ee; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo">💻</div>
            <h1>NetSim — Доступ</h1>
            <p>Интерактивный симулятор компьютерных сетей</p>
        </div>

        <div class="login-tabs">
            <button class="tab-btn active" id="tab-login-btn" onclick="switchTab('login')">Вход</button>
            <button class="tab-btn" id="tab-reg-btn" onclick="switchTab('register')">Регистрация</button>
        </div>

        <!-- ВХОД -->
        <div class="login-form active" id="tab-login">
            <div class="error-msg" id="login-error"></div>
            <div class="field-group">
                <label>Логин</label>
                <input type="text" id="login-username" placeholder="Введите логин" autocomplete="username">
            </div>
            <div class="field-group">
                <label>Пароль</label>
                <input type="password" id="login-password" placeholder="Введите пароль" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <button class="btn-login" onclick="doLogin()">Войти →</button>
            <a href="index.html" class="back-to-index">← Вернуться к выбору роли</a>
        </div>

        <!-- РЕГИСТРАЦИЯ -->
        <div class="login-form" id="tab-register">
            <div class="error-msg"    id="reg-error"></div>
            <div class="success-msg"  id="reg-success"></div>
            <div class="field-group">
                <label>Полное имя</label>
                <input type="text" id="reg-name" placeholder="Например: Иванов Алексей">
            </div>
            <div class="field-group">
                <label>Логин</label>
                <input type="text" id="reg-login" placeholder="Придумайте логин">
            </div>
            <div class="field-group">
                <label>Пароль</label>
                <input type="password" id="reg-password" placeholder="Не менее 4 символов"
                    onkeydown="if(event.key==='Enter') doRegister()">
            </div>
            <button class="btn-login" onclick="doRegister()">Зарегистрироваться →</button>
            <a href="index.html" class="back-to-index">← Вернуться к выбору роли</a>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('tab-login-btn').classList.remove('active');
            document.getElementById('tab-reg-btn').classList.remove('active');
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('tab-' + (tab === 'login' ? 'login' : 'reg') + '-btn').classList.add('active');
        }

        function showErr(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideMsg(id) { document.getElementById(id).style.display = 'none'; }

        async function doLogin() {
            hideMsg('login-error');
            const login    = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!login || !password) return showErr('login-error', 'Заполните все поля');
            const result = await DB.loginUser(login, password);
            if (!result.ok) return showErr('login-error', result.msg);
            DB.setCurrentUser(result.user);
            window.location.href = 'simulator.html';
        }

        async function doRegister() {
            hideMsg('reg-error');
            hideMsg('reg-success');
            const name     = document.getElementById('reg-name').value.trim();
            const login    = document.getElementById('reg-login').value.trim();
            const password = document.getElementById('reg-password').value;
            if (!name || !login || !password) return showErr('reg-error', 'Заполните все поля');
            if (password.length < 4) return showErr('reg-error', 'Пароль должен быть не менее 4 символов');
            if (login.length < 3) return showErr('reg-error', 'Логин должен быть не менее 3 символов');
            const result = await DB.register(name, login, password);
            if (!result.ok) return showErr('reg-error', result.msg);
            const s = document.getElementById('reg-success');
            s.textContent = '✅ Регистрация прошла успешно! Теперь войдите в систему.';
            s.style.display = 'block';
            setTimeout(() => switchTab('login'), 1500);
        }
    </script>
</body>
</html>
